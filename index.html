<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Montenegro: A Field Guide</title>
  <meta name="description" content="A curated solo travel guide to Montenegro" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1a1a2e" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold: #c9a84c;
      --cream: #f0e6d3;
      --cream-dim: #c8b99a;
      --bg: #0f0f1a;
      --bg-card: #1a1a2e;
      --text: #f0e6d3;
      --text-dim: #9a8f7e;
      --red: #e07b5a;
      --green: #6dbf8a;
      --border: rgba(201,168,76,0.2);
      --border-rest: rgba(109,191,138,0.2);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; line-height: 1.6; }

    .hero { position: relative; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; overflow: hidden; }
    .hero-bg { position: absolute; inset: 0; background: radial-gradient(ellipse at 20% 50%, rgba(201,168,76,0.12) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(26,26,46,0.8) 0%, transparent 50%), linear-gradient(160deg, #0f0f1a 0%, #1a1a2e 40%, #0d1b2a 100%); z-index: 0; }
    .hero-pattern { position: absolute; inset: 0; opacity: 0.04; background-image: repeating-linear-gradient(45deg, var(--gold) 0px, var(--gold) 1px, transparent 1px, transparent 40px); z-index: 0; }
    .hero-content { position: relative; z-index: 1; animation: fadeUp 1.2s ease both; }
    .hero-eyebrow { font-size: 0.7rem; font-weight: 500; letter-spacing: 0.25em; text-transform: uppercase; color: var(--gold); margin-bottom: 1.5rem; }
    .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(3rem, 10vw, 6rem); font-weight: 700; line-height: 1.05; color: var(--cream); margin-bottom: 0.3rem; }
    .hero h1 em { font-style: italic; color: var(--gold); }
    .hero-subtitle { font-family: 'Playfair Display', serif; font-style: italic; font-size: clamp(1rem, 3vw, 1.4rem); color: var(--cream-dim); margin-bottom: 2rem; }
    .hero-meta { display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap; margin-bottom: 3rem; }
    .hero-meta span { font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-dim); border: 1px solid var(--border); padding: 0.4rem 1rem; border-radius: 2px; }
    .hero-scroll { position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%); z-index: 1; animation: bounce 2s infinite; }
    .hero-scroll svg { width: 24px; height: 24px; stroke: var(--gold); opacity: 0.6; }

    .lang-toggle { position: fixed; top: 1.2rem; right: 1.2rem; z-index: 100; display: flex; border: 1px solid var(--border); border-radius: 3px; overflow: hidden; backdrop-filter: blur(10px); background: rgba(15,15,26,0.7); }
    .lang-btn { padding: 0.4rem 0.9rem; font-size: 0.72rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; border: none; background: transparent; color: var(--text-dim); transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
    .lang-btn.active { background: var(--gold); color: var(--bg); }

    main { max-width: 820px; margin: 0 auto; padding: 0 1.2rem 5rem; }
    .section-header { display: flex; align-items: center; gap: 1rem; margin: 4rem 0 1.5rem; }
    .section-header h2 { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: var(--cream); white-space: nowrap; }
    .section-line { flex: 1; height: 1px; background: var(--border); }

    .experience-block { background: var(--bg-card); border: 1px solid var(--border); border-radius: 4px; margin-bottom: 0.8rem; overflow: hidden; transition: border-color 0.2s; }
    .experience-block:hover { border-color: rgba(201,168,76,0.4); }
    .experience-block.visited { opacity: 0.55; }
    .exp-header { display: flex; align-items: center; gap: 0.8rem; padding: 1rem 1.2rem; cursor: pointer; user-select: none; }
    .exp-checkbox { width: 18px; height: 18px; border: 1.5px solid var(--gold); border-radius: 2px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: background 0.2s; cursor: pointer; }
    .experience-block.visited .exp-checkbox { background: var(--gold); }
    .exp-checkbox svg { width: 11px; height: 11px; stroke: var(--bg); opacity: 0; transition: opacity 0.2s; }
    .experience-block.visited .exp-checkbox svg { opacity: 1; }
    .exp-title-wrap { flex: 1; }
    .exp-title { font-family: 'Playfair Display', serif; font-size: 1.05rem; color: var(--cream); display: flex; align-items: center; gap: 0.6rem; flex-wrap: wrap; }
    .badge { font-family: 'DM Sans', sans-serif; font-size: 0.62rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.2rem 0.55rem; border-radius: 2px; }
    .badge-must { background: rgba(201,168,76,0.15); color: var(--gold); border: 1px solid rgba(201,168,76,0.3); }
    .badge-duration { background: rgba(240,230,211,0.07); color: var(--text-dim); border: 1px solid rgba(240,230,211,0.12); }
    .exp-location { font-size: 0.75rem; color: var(--text-dim); margin-top: 0.15rem; }
    .exp-chevron { width: 16px; height: 16px; stroke: var(--text-dim); transition: transform 0.3s; flex-shrink: 0; }
    .experience-block.open .exp-chevron { transform: rotate(180deg); }
    .exp-body { display: none; padding: 0 1.2rem 1.2rem; border-top: 1px solid var(--border); }
    .experience-block.open .exp-body { display: block; }
    .exp-desc { color: var(--cream-dim); font-size: 0.9rem; margin: 0.9rem 0 0.7rem; line-height: 1.65; }
    .exp-curiosity { background: rgba(201,168,76,0.06); border-left: 2px solid var(--gold); padding: 0.7rem 0.9rem; border-radius: 0 3px 3px 0; margin: 0.8rem 0; font-size: 0.85rem; color: var(--cream-dim); font-style: italic; }
    .exp-curiosity strong { font-style: normal; color: var(--gold); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; display: block; margin-bottom: 0.3rem; }
    .maps-link { display: inline-flex; align-items: center; gap: 0.4rem; font-size: 0.75rem; color: var(--gold); text-decoration: none; border: 1px solid var(--border); padding: 0.3rem 0.8rem; border-radius: 2px; margin-top: 0.6rem; transition: all 0.2s; font-family: 'DM Sans', sans-serif; }
    .maps-link:hover { background: rgba(201,168,76,0.1); }

    .exp-restaurants { margin-top: 1.1rem; }
    .exp-restaurants-toggle { display: flex; align-items: center; justify-content: space-between; cursor: pointer; padding: 0.4rem 0; user-select: none; }
    .exp-restaurants-toggle:hover .exp-restaurants-label { color: var(--cream-dim); }
    .exp-restaurants-label { font-size: 0.67rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--green); transition: color 0.2s; }
    .exp-restaurants-body { margin-top: 0.5rem; }
    .rest-row { display: flex; gap: 0.8rem; align-items: flex-start; padding: 0.65rem 0.8rem; background: rgba(109,191,138,0.04); border: 1px solid var(--border-rest); border-radius: 3px; margin-bottom: 0.4rem; }
    .rest-meal { font-size: 0.6rem; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase; color: var(--green); flex-shrink: 0; padding-top: 0.2rem; min-width: 42px; }
    .rest-info { flex: 1; }
    .rest-name { font-family: 'Playfair Display', serif; font-size: 0.9rem; color: var(--cream); }
    .rest-desc { font-size: 0.78rem; color: var(--text-dim); margin-top: 0.1rem; line-height: 1.45; }
    .rest-maps { display: inline-flex; align-items: center; gap: 0.3rem; font-size: 0.68rem; color: var(--gold); text-decoration: none; margin-top: 0.3rem; opacity: 0.75; transition: opacity 0.2s; }
    .rest-maps:hover { opacity: 1; }

    .exp-notes label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-dim); display: block; margin-top: 0.9rem; }
    .exp-notes textarea { width: 100%; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 3px; color: var(--cream-dim); font-family: 'DM Sans', sans-serif; font-size: 0.82rem; padding: 0.6rem 0.8rem; resize: vertical; min-height: 60px; margin-top: 0.4rem; outline: none; transition: border-color 0.2s; }
    .exp-notes textarea:focus { border-color: rgba(201,168,76,0.4); }

    .food-grid { display: flex; flex-direction: column; gap: 0.6rem; }
    .food-row { background: var(--bg-card); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
    .food-row-header { display: flex; align-items: center; gap: 1rem; padding: 0.75rem 1.1rem; cursor: pointer; user-select: none; }
    .food-row-header:hover { background: rgba(255,255,255,0.02); }
    .food-icon { font-size: 1.3rem; flex-shrink: 0; }
    .food-name { font-family: 'Playfair Display', serif; font-size: 0.95rem; color: var(--cream); flex: 1; }
    .food-price { font-size: 0.72rem; color: var(--green); font-weight: 500; flex-shrink: 0; white-space: nowrap; }
    .food-chevron { width: 14px; height: 14px; stroke: var(--text-dim); transition: transform 0.3s; flex-shrink: 0; }
    .food-row.open .food-chevron { transform: rotate(180deg); }
    .food-body { display: none; padding: 0 1.1rem 0.8rem; border-top: 1px solid var(--border); }
    .food-row.open .food-body { display: block; }
    .food-desc { font-size: 0.82rem; color: var(--text-dim); margin-top: 0.6rem; line-height: 1.55; }

    .phrase-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .phrase-row { background: var(--bg-card); border: 1px solid var(--border); border-radius: 4px; padding: 0.75rem 1.1rem; display: flex; align-items: center; gap: 1rem; }
    .phrase-texts { flex: 1; }
    .phrase-original { font-family: 'Playfair Display', serif; font-size: 0.95rem; color: var(--cream); }
    .phrase-translation { font-size: 0.78rem; color: var(--text-dim); margin-top: 0.1rem; }
    .phrase-pronunciation { font-size: 0.75rem; color: var(--gold); font-style: italic; margin-top: 0.1rem; }
    .speak-btn { background: none; border: 1px solid var(--border); border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: all 0.2s; color: var(--gold); }
    .speak-btn:hover { background: rgba(201,168,76,0.1); border-color: var(--gold); }
    .speak-btn svg { width: 14px; height: 14px; }

    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }
    @media (max-width: 500px) { .info-grid { grid-template-columns: 1fr; } }
    .info-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 4px; padding: 1rem 1.1rem; }
    .info-card h4 { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--gold); margin-bottom: 0.5rem; }
    .info-card p { font-size: 0.85rem; color: var(--cream-dim); line-height: 1.6; }

    .offline-banner { display: none; background: rgba(224,123,90,0.15); border-bottom: 1px solid rgba(224,123,90,0.3); text-align: center; padding: 0.5rem; font-size: 0.78rem; color: var(--red); }
    footer { text-align: center; padding: 2rem; color: var(--text-dim); font-size: 0.75rem; border-top: 1px solid var(--border); margin-top: 3rem; }
    footer em { color: var(--gold); font-style: italic; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes bounce { 0%, 100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(8px); } }
  </style>
</head>

<main>
  <div class="section-header"><h2 id="sec-mustsee"></h2><div class="section-line"></div></div>

</main>

<footer><p id="footer-text"></p></footer>

let currentLang = 'en';

function renderExperiences(lang) {
  const ui = UI[lang];
  document.getElementById('experienceBlocks').innerHTML = EXPERIENCES.map(exp => {
    const c = exp[lang];
    const mustBadge = exp.must ? `<span class="badge badge-must">${ui.must}</span>` : '';
    const restRows = c.restaurants.map(r => `
      <div class="rest-row">
        <div class="rest-meal">${r.meal}</div>
        <div class="rest-info">
          <div class="rest-name">${r.name}</div>
          <div class="rest-desc">${r.desc}</div>
          <a class="rest-maps" href="${r.maps}" target="_blank">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>Maps
          </a>
        </div>
      </div>`).join('');
    return `
    <div class="experience-block" id="block-${exp.id}">
      <div class="exp-header" onclick="toggleBlock('block-${exp.id}')">
        <div class="exp-checkbox" onclick="toggleVisited(event,'block-${exp.id}')">
          <svg viewBox="0 0 12 12" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="2 6 5 9 10 3"></polyline></svg>
        </div>
        <div class="exp-title-wrap">
          <div class="exp-title">${exp.title} ${mustBadge} <span class="badge badge-duration">${exp.duration[lang]}</span></div>
          <div class="exp-location">${exp.location}</div>
        </div>
        <svg class="exp-chevron" viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
      </div>
      <div class="exp-body">
        <p class="exp-desc">${c.desc}</p>
        <div class="exp-curiosity"><strong>${ui.curiosity}</strong>${c.curiosity}</div>
        <a class="maps-link" href="${exp.mapsUrl}" target="_blank">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>Open in Maps
        </a>
        <div class="exp-restaurants">
          <div class="exp-restaurants-toggle" onclick="toggleEat(this)">
            <span class="exp-restaurants-label">${c.eatlabel}</span>
            <svg class="food-chevron" viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
          </div>
          <div class="exp-restaurants-body" style="display:none">${restRows}</div>
        </div>
        <div class="exp-notes">
          <label>${ui.notes}</label>
          <textarea id="notes-${exp.id}" placeholder="${ui.notesPlaceholder}" oninput="saveNote('${exp.id}',this.value)"></textarea>
        </div>
      </div>
    </div>`;
  }).join('');
}

function applyLang(lang) {
  const ui = UI[lang];
  document.getElementById('hero-eyebrow').textContent  = ui.eyebrow;
  document.getElementById('hero-subtitle').textContent = ui.subtitle;
  document.getElementById('hero-days').textContent     = ui.days;
  document.getElementById('hero-solo').textContent     = ui.solo;
  document.getElementById('sec-mustsee').textContent   = ui.mustsee;
  document.getElementById('sec-food').textContent      = ui.food;
  document.getElementById('sec-phrases').textContent   = ui.phrases;
  document.getElementById('sec-practical').textContent = ui.practical;
  document.getElementById('footer-text').innerHTML     = ui.footer;

  const open    = Array.from(document.querySelectorAll('.experience-block.open')).map(e=>e.id);
  const visited = Array.from(document.querySelectorAll('.experience-block.visited')).map(e=>e.id);
  renderExperiences(lang);
  open.forEach(id    => document.getElementById(id)?.classList.add('open'));
  visited.forEach(id => document.getElementById(id)?.classList.add('visited'));

  document.getElementById('foodGrid').innerHTML = FOOD[lang].map((f,i)=>`
    <div class="food-row" id="food-${i}">
      <div class="food-row-header" onclick="toggleFood(${i})">
        <div class="food-icon">${f.icon}</div>
        <div class="food-name">${f.name}</div>
        <div class="food-price">${f.price}</div>
        <svg class="food-chevron" viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
      </div>
      <div class="food-body"><p class="food-desc">${f.desc}</p></div>
    </div>`).join('');

  document.getElementById('phraseList').innerHTML = PHRASES.map(p=>`
    <div class="phrase-row">
      <div class="phrase-texts">
        <div class="phrase-original">${p.mn}</div>
        <div class="phrase-translation">${p[lang]}</div>
        <div class="phrase-pronunciation">${p.pron}</div>
      </div>
      <button class="speak-btn" onclick="speak('${p.mn.replace(/'/g,"\\'")}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path>
        </svg>
      </button>
    </div>`).join('');

  document.getElementById('infoGrid').innerHTML = PRACTICAL[lang].map(p=>`
    <div class="info-card"><h4>${p.title}</h4><p>${p.text}</p></div>`).join('');

  loadNotes();
}

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.textContent===lang.toUpperCase()));
  applyLang(lang);
}

function toggleFood(i) { document.getElementById('food-'+i).classList.toggle('open'); }

function toggleEat(el) {
  const body = el.nextElementSibling;
  const isOpen = body.style.display !== 'none';
  body.style.display = isOpen ? 'none' : 'block';
  el.querySelector('.food-chevron').style.transform = isOpen ? '' : 'rotate(180deg)';
}

function toggleBlock(id) { document.getElementById(id).classList.toggle('open'); }

function toggleVisited(e,id) {
  e.stopPropagation();
  const el = document.getElementById(id);
  el.classList.toggle('visited');
  const v = JSON.parse(localStorage.getItem('mne_visited')||'{}');
  v[id] = el.classList.contains('visited');
  localStorage.setItem('mne_visited',JSON.stringify(v));
}

function saveNote(key,value) {
  const n = JSON.parse(localStorage.getItem('mne_notes')||'{}');
  n[key]=value; localStorage.setItem('mne_notes',JSON.stringify(n));
}

function loadNotes() {
  const n = JSON.parse(localStorage.getItem('mne_notes')||'{}');
  EXPERIENCES.forEach(exp=>{const ta=document.getElementById('notes-'+exp.id);if(ta&&n[exp.id])ta.value=n[exp.id];});
}

function loadVisited() {
  const v = JSON.parse(localStorage.getItem('mne_visited')||'{}');
  Object.entries(v).forEach(([id,val])=>{if(val)document.getElementById(id)?.classList.add('visited');});
}

function speak(text) {
  if(!('speechSynthesis' in window))return;
  const u=new SpeechSynthesisUtterance(text); u.lang='sr-RS'; u.rate=0.85;
  window.speechSynthesis.cancel(); window.speechSynthesis.speak(u);
}

function updateOnline(){document.getElementById('offlineBanner').style.display=navigator.onLine?'none':'block';}
window.addEventListener('online',updateOnline); window.addEventListener('offline',updateOnline); updateOnline();
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(()=>{});}

applyLang('en');
loadVisited();
</script>
</body>
</html>
